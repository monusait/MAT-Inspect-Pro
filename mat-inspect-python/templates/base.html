<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MAT Inspect Pro{% endblock %}</title>
    <meta name="description" content="Digital Transformation of Heavy Equipment Inspection Protocols — MAT School">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
            <div id="toast-container" class="toast-container">
                {% for category, message in messages %}
                    <div class="toast {{ category }}" id="toast-{{ loop.index }}">
                        <i class="fa-solid {{ 'fa-circle-check' if category == 'success' else 'fa-triangle-exclamation' }}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            <script>
                setTimeout(() => {
                    document.querySelectorAll('.toast').forEach(t => t.style.opacity = '0');
                }, 4000);
            </script>
        {% endif %}
    {% endwith %}

    <div id="app-container">
        {% block nav %}{% endblock %}
        <main class="view-container">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
